site_name: django-autowired
site_description: Spring Boot-style @injectable autowiring for Python
site_url: https://tylersuehr.github.io/django-autowired
repo_url: https://github.com/tylersuehr/django-autowired
repo_name: tylersuehr/django-autowired
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            separate_signature: true
            docstring_style: google
            merge_init_into_class: true

nav:
  - Home: index.md
  - Guide:
      - "@injectable": guide/injectable.md
      - Scopes: guide/scopes.md
      - Scanning: guide/scanning.md
      - Container: guide/container.md
      - Extra modules: guide/extra_modules.md
      - Testing: guide/testing.md
      - Inspect: guide/inspect.md
  - Backends:
      - injector: backends/injector.md
      - lagom: backends/lagom.md
      - wireup: backends/wireup.md
      - dishka: backends/dishka.md
  - Integrations:
      - Django: integrations/django.md
      - FastAPI: integrations/fastapi.md
      - Flask: integrations/flask.md
  - Reference:
      - API: reference/api.md
